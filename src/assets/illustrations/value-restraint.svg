<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">

  <!-- ============================================================
       CORE VALUE: RESTRAINT — 절제
       광활한 등각투영 데스크 매트 위에 펜 하나.
       네거티브 스페이스가 메시지.
       Color: #003DA5 (Blueprint Blue), stroke only
       Perspective: 30° true isometric
       ============================================================ -->

  <defs>
    <!-- Clip path for mat surface grid -->
    <clipPath id="restraint-mat-clip">
      <polygon points="200,230 355,140 265,88 110,178" />
    </clipPath>
    <!-- Clip path for detail callout inset -->
    <clipPath id="restraint-inset-clip">
      <circle cx="68" cy="90" r="42" />
    </clipPath>
  </defs>

  <!-- ============================================================
       Layer 1: DESK MAT (large isometric surface, mostly empty)
       Front corner: (200, 230), W=180, D=105
       ============================================================ -->
  <g>
    <!-- Top face (vast surface) -->
    <polygon
      points="200,230 355,140 265,88 110,178"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.015)"
    />

    <!-- Subtle grid pattern on surface (very faint) -->
    <g clip-path="url(#restraint-mat-clip)" stroke="#003DA5" stroke-width="0.25" opacity="0.1">
      <!-- Set A: parallel to width -->
      <line x1="191" y1="225" x2="346" y2="135" />
      <line x1="182" y1="220" x2="337" y2="130" />
      <line x1="173" y1="215" x2="328" y2="125" />
      <line x1="164" y1="210" x2="319" y2="120" />
      <line x1="155" y1="205" x2="310" y2="115" />
      <line x1="146" y1="200" x2="301" y2="110" />
      <line x1="137" y1="195" x2="292" y2="105" />
      <line x1="128" y1="190" x2="283" y2="100" />
      <line x1="119" y1="185" x2="274" y2="95" />
      <!-- Set B: parallel to depth -->
      <line x1="219" y1="221" x2="129" y2="169" />
      <line x1="238" y1="210" x2="148" y2="158" />
      <line x1="257" y1="199" x2="167" y2="147" />
      <line x1="276" y1="188" x2="186" y2="136" />
      <line x1="295" y1="177" x2="205" y2="125" />
      <line x1="314" y1="166" x2="224" y2="114" />
      <line x1="333" y1="155" x2="243" y2="103" />
    </g>

    <!-- Right side face (thin edge, 3mm) -->
    <polygon
      points="200,230 355,140 355,143 200,233"
      stroke="#003DA5" stroke-width="0.8"
      fill="rgba(0,61,165,0.05)"
    />
    <!-- Left side face (thin edge) -->
    <polygon
      points="200,230 110,178 110,181 200,233"
      stroke="#003DA5" stroke-width="0.8"
      fill="rgba(0,61,165,0.04)"
    />
  </g>

  <!-- ============================================================
       Layer 2: SINGLE PEN (centered on mat, product-level detail)
       Small relative to the vast surface = visual restraint
       ============================================================ -->
  <g>
    <!-- Pen body (rollerball style, isometric angle) -->
    <!-- Cap -->
    <ellipse cx="240" cy="158" rx="4" ry="2" stroke="#003DA5" stroke-width="0.8" fill="rgba(0,61,165,0.02)" />
    <line x1="236" y1="158" x2="236" y2="175" stroke="#003DA5" stroke-width="0.8" />
    <line x1="244" y1="158" x2="244" y2="175" stroke="#003DA5" stroke-width="0.8" />
    <ellipse cx="240" cy="175" rx="4" ry="2" stroke="#003DA5" stroke-width="0.8" fill="rgba(0,61,165,0.02)" />

    <!-- Cap clip -->
    <line x1="244" y1="159" x2="245.5" y2="159" stroke="#003DA5" stroke-width="0.6" />
    <line x1="245.5" y1="159" x2="245.5" y2="174" stroke="#003DA5" stroke-width="0.6" />

    <!-- Barrel -->
    <line x1="236" y1="178" x2="236" y2="206" stroke="#003DA5" stroke-width="0.8" />
    <line x1="244" y1="178" x2="244" y2="206" stroke="#003DA5" stroke-width="0.8" />

    <!-- Grip texture -->
    <g stroke="#003DA5" stroke-width="0.2" opacity="0.25">
      <line x1="236" y1="196" x2="244" y2="196" />
      <line x1="236" y1="199" x2="244" y2="199" />
      <line x1="236" y1="202" x2="244" y2="202" />
      <line x1="236" y1="205" x2="244" y2="205" />
    </g>

    <!-- Barrel ring -->
    <ellipse cx="240" cy="194" rx="4.5" ry="2.2" stroke="#003DA5" stroke-width="0.4" fill="none" opacity="0.3" />

    <!-- Tip taper -->
    <line x1="236" y1="206" x2="238" y2="214" stroke="#003DA5" stroke-width="0.8" />
    <line x1="244" y1="206" x2="242" y2="214" stroke="#003DA5" stroke-width="0.8" />
    <!-- Ball tip -->
    <circle cx="240" cy="215" r="1" fill="#003DA5" opacity="0.4" />
  </g>

  <!-- ============================================================
       Layer 3: DETAIL CALLOUT (magnified pen construction)
       Source: circle around pen → Inset circle (upper-left)
       ============================================================ -->
  <g>
    <!-- Source circle around the pen -->
    <circle cx="240" cy="186" r="22"
      stroke="#003DA5" stroke-width="0.6" stroke-dasharray="4 2"
      fill="none" opacity="0.35" />

    <!-- Leader line from source to inset -->
    <line x1="220" y1="172" x2="107" y2="100"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.3" />

    <!-- Magnified inset circle (upper-left) -->
    <circle cx="68" cy="90" r="42"
      stroke="#003DA5" stroke-width="0.8"
      fill="rgba(0,61,165,0.01)" />

    <!-- Magnified pen content inside inset -->
    <g clip-path="url(#restraint-inset-clip)">
      <!-- Magnified cap (3x scale) -->
      <ellipse cx="68" cy="62" rx="10" ry="5" stroke="#003DA5" stroke-width="0.8" fill="rgba(0,61,165,0.02)" />
      <line x1="58" y1="62" x2="58" y2="88" stroke="#003DA5" stroke-width="0.8" />
      <line x1="78" y1="62" x2="78" y2="88" stroke="#003DA5" stroke-width="0.8" />
      <ellipse cx="68" cy="88" rx="10" ry="5" stroke="#003DA5" stroke-width="0.8" fill="rgba(0,61,165,0.02)" />
      <!-- Cap clip detail -->
      <line x1="78" y1="64" x2="81" y2="64" stroke="#003DA5" stroke-width="0.6" />
      <line x1="81" y1="64" x2="81" y2="86" stroke="#003DA5" stroke-width="0.6" />
      <!-- Band detail -->
      <ellipse cx="68" cy="68" rx="10.5" ry="5.2" stroke="#003DA5" stroke-width="0.4" fill="none" opacity="0.4" />
      <!-- Barrel section below -->
      <line x1="58" y1="93" x2="58" y2="125" stroke="#003DA5" stroke-width="0.8" />
      <line x1="78" y1="93" x2="78" y2="125" stroke="#003DA5" stroke-width="0.8" />
      <!-- Grip knurling -->
      <g stroke="#003DA5" stroke-width="0.3" opacity="0.3">
        <line x1="58" y1="108" x2="78" y2="108" />
        <line x1="58" y1="112" x2="78" y2="112" />
        <line x1="58" y1="116" x2="78" y2="116" />
        <line x1="58" y1="120" x2="78" y2="120" />
      </g>
    </g>

    <!-- Inset label -->
    <text x="68" y="140"
      font-family="'Doto', monospace" font-size="5" fill="#003DA5"
      text-anchor="middle" opacity="0.4">
      DETAIL (3:1)
    </text>
  </g>

  <!-- ============================================================
       Layer 4: GHOST ELEMENTS
       Boundary frame emphasizing negative space
       ============================================================ -->
  <g opacity="0.08">
    <!-- Faint boundary rectangle on the mat surface -->
    <polygon
      points="200,230 340,149 262,103 122,184"
      stroke="#003DA5" stroke-width="0.8" stroke-dasharray="6 4"
      fill="none"
    />
  </g>

  <!-- ============================================================
       Annotations: Leader lines + Labels
       ============================================================ -->
  <g>
    <!-- 1 PEN label (right side) -->
    <line x1="252" y1="186" x2="330" y2="260"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="252" cy="186" r="1.5" fill="#003DA5" />
    <text x="334" y="258"
      font-family="'Doto', monospace" font-size="7" fill="#003DA5">
      1 PEN
    </text>
    <text x="334" y="268"
      font-family="'Doto', monospace" font-size="6" fill="#003DA5" opacity="0.5">
      BRASS BODY
    </text>

    <!-- NEGATIVE SPACE label (in the empty area) -->
    <text x="170" y="160"
      font-family="'Doto', monospace" font-size="7" fill="#003DA5" opacity="0.35">
      NEGATIVE SPACE
    </text>
    <text x="170" y="169"
      font-family="'Doto', monospace" font-size="6" fill="#003DA5" opacity="0.25">
      94%
    </text>

    <!-- BARREL annotation from inset -->
    <line x1="82" y1="110" x2="120" y2="130"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="82" cy="110" r="1.5" fill="#003DA5" />
    <text x="124" y="128"
      font-family="'Doto', monospace" font-size="7" fill="#003DA5">
      ∅12MM
    </text>
    <text x="124" y="138"
      font-family="'Doto', monospace" font-size="6" fill="#003DA5" opacity="0.5">
      BARREL
    </text>

    <!-- MAT SURFACE label -->
    <line x1="265" y1="88" x2="300" y2="68"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="265" cy="88" r="1.5" fill="#003DA5" />
    <text x="304" y="66"
      font-family="'Doto', monospace" font-size="7" fill="#003DA5">
      PU LEATHER
    </text>
    <text x="304" y="76"
      font-family="'Doto', monospace" font-size="6" fill="#003DA5" opacity="0.5">
      3MM THICK
    </text>
  </g>

  <!-- ============================================================
       Dimension lines
       ============================================================ -->
  <g>
    <!-- Mat width dimension (right edge, below mat) -->
    <g stroke="#003DA5" stroke-width="0.5" opacity="0.4">
      <line x1="200" y1="245" x2="355" y2="155" stroke-dasharray="2 2" />
      <line x1="198" y1="243" x2="202" y2="247" />
      <line x1="353" y1="153" x2="357" y2="157" />
    </g>
    <text x="272" y="208"
      font-family="'Doto', monospace" font-size="6" fill="#003DA5" opacity="0.5"
      transform="rotate(-30, 272, 208)">
      600MM
    </text>

    <!-- Pen length dimension (small, contrasting with mat) -->
    <g stroke="#003DA5" stroke-width="0.4" opacity="0.35">
      <line x1="250" y1="155" x2="250" y2="217" stroke-dasharray="2 2" />
      <line x1="248" y1="155" x2="252" y2="155" />
      <line x1="248" y1="217" x2="252" y2="217" />
    </g>
    <text x="257" y="188"
      font-family="'Doto', monospace" font-size="5" fill="#003DA5" opacity="0.4">
      140MM
    </text>
  </g>

  <!-- ============================================================
       Title
       ============================================================ -->
  <text x="200" y="370"
    font-family="'Doto', monospace" font-size="8" fill="#003DA5"
    text-anchor="middle" letter-spacing="0.1em">
    RESTRAINT
  </text>

</svg>
