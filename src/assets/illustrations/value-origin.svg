<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">

  <!-- ============================================================
       CORE VALUE: ORIGIN — 시작점
       종이 위의 첫 번째 선, 연필 한 획
       Color: #003DA5 (Blueprint Blue), stroke only
       ============================================================ -->

  <!-- Paper (large, slightly rotated isometric) -->
  <polygon
    points="200,100 310,160 200,300 90,240"
    stroke="#003DA5" stroke-width="0.6"
    fill="rgba(0,61,165,0.015)"
  />

  <!-- Paper shadow -->
  <polygon
    points="200,304 310,164 310,166 200,306 90,244 90,242"
    stroke="none" fill="rgba(0,61,165,0.02)"
  />

  <!-- First line drawn — the origin stroke -->
  <path
    d="M 150,210 Q 180,195 220,185 Q 250,178 270,180"
    stroke="#003DA5" stroke-width="1.5"
    fill="none" stroke-linecap="round"
    opacity="0.7"
  />

  <!-- Pencil tip at the start of the line -->
  <g>
    <!-- Pencil body -->
    <line x1="118" y1="235" x2="150" y2="210"
      stroke="#003DA5" stroke-width="2" stroke-linecap="round" opacity="0.5" />
    <!-- Pencil taper -->
    <line x1="147" y1="213" x2="153" y2="208"
      stroke="#003DA5" stroke-width="1" stroke-linecap="round" opacity="0.6" />
    <!-- Pencil tip point -->
    <circle cx="150" cy="210" r="1" fill="#003DA5" opacity="0.5" />
  </g>

  <!-- Origin marker (coordinate system hint) -->
  <g opacity="0.3">
    <!-- Origin dot -->
    <circle cx="150" cy="210" r="4"
      stroke="#003DA5" stroke-width="0.6" fill="none" />
    <!-- X arrow -->
    <line x1="150" y1="210" x2="175" y2="196"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <!-- Y arrow -->
    <line x1="150" y1="210" x2="136" y2="196"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
  </g>

  <!-- "0,0" coordinate label -->
  <text x="155" y="228"
    font-family="'VT323', monospace" font-size="6" fill="#003DA5" opacity="0.4">
    0, 0
  </text>

  <!-- Faint guidelines radiating from origin -->
  <g stroke="#003DA5" stroke-width="0.3" stroke-dasharray="4 4" opacity="0.1">
    <line x1="150" y1="210" x2="300" y2="130" />
    <line x1="150" y1="210" x2="100" y2="130" />
    <line x1="150" y1="210" x2="200" y2="310" />
  </g>

  <!-- Label -->
  <text x="200" y="365"
    font-family="'VT323', monospace" font-size="7" fill="#003DA5"
    text-anchor="middle" opacity="0.5">
    FIRST LINE
  </text>

</svg>
