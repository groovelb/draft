<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">

  <!-- ============================================================
       USP: BLUEPRINT AESTHETIC
       동심원, 접선, 황금비 나선. 도면 언어 자체가 미학.
       Color: #003DA5 (Blueprint Blue), stroke only
       ============================================================ -->

  <!-- Concentric circles -->
  <circle cx="185" cy="195" r="18"
    stroke="#003DA5" stroke-width="0.8" fill="none" opacity="0.4" />
  <circle cx="185" cy="195" r="40"
    stroke="#003DA5" stroke-width="0.6" fill="none" opacity="0.3" />
  <circle cx="185" cy="195" r="65"
    stroke="#003DA5" stroke-width="0.5" fill="none" opacity="0.22" />
  <circle cx="185" cy="195" r="92"
    stroke="#003DA5" stroke-width="0.4" fill="none" opacity="0.15" />
  <circle cx="185" cy="195" r="120"
    stroke="#003DA5" stroke-width="0.3" fill="none" opacity="0.1" />

  <!-- Center point -->
  <circle cx="185" cy="195" r="2"
    fill="#003DA5" opacity="0.35" />
  <circle cx="185" cy="195" r="0.8"
    fill="#003DA5" opacity="0.6" />

  <!-- Tangent lines -->
  <line x1="100" y1="100" x2="310" y2="145"
    stroke="#003DA5" stroke-width="0.6" opacity="0.25" />
  <line x1="80" y1="260" x2="320" y2="215"
    stroke="#003DA5" stroke-width="0.5" opacity="0.2" />
  <line x1="145" y1="80" x2="170" y2="320"
    stroke="#003DA5" stroke-width="0.4" opacity="0.15" />

  <!-- Tangent contact points -->
  <g fill="#003DA5" opacity="0.35">
    <circle cx="205" cy="157" r="1.5" />
    <circle cx="178" cy="235" r="1.5" />
    <circle cx="160" cy="175" r="1.5" />
  </g>

  <!-- Construction arcs -->
  <path d="M250,140 A80,80 0 0 1 275,210"
    stroke="#003DA5" stroke-width="0.5" stroke-dasharray="4 3"
    fill="none" opacity="0.2" />
  <path d="M120,130 A90,90 0 0 0 100,230"
    stroke="#003DA5" stroke-width="0.4" stroke-dasharray="3 3"
    fill="none" opacity="0.15" />

  <!-- Golden ratio spiral -->
  <g opacity="0.12">
    <path d="M185,195
             Q185,177 203,177
             Q221,177 221,195
             Q221,218 198,218
             Q170,218 170,190
             Q170,158 200,158
             Q235,158 235,195
             Q235,232 195,232
             Q155,232 155,190"
      stroke="#003DA5" stroke-width="0.8"
      fill="none" />
  </g>

  <!-- Ghost background grid -->
  <g opacity="0.06" stroke="#003DA5" stroke-width="0.3">
    <line x1="50" y1="100" x2="350" y2="100" />
    <line x1="50" y1="140" x2="350" y2="140" />
    <line x1="50" y1="180" x2="350" y2="180" />
    <line x1="50" y1="220" x2="350" y2="220" />
    <line x1="50" y1="260" x2="350" y2="260" />
    <line x1="50" y1="300" x2="350" y2="300" />
    <line x1="90" y1="80" x2="90" y2="320" />
    <line x1="130" y1="80" x2="130" y2="320" />
    <line x1="170" y1="80" x2="170" y2="320" />
    <line x1="210" y1="80" x2="210" y2="320" />
    <line x1="250" y1="80" x2="250" y2="320" />
    <line x1="290" y1="80" x2="290" y2="320" />
    <line x1="330" y1="80" x2="330" y2="320" />
  </g>

</svg>
