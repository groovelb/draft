<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">

  <!-- ============================================================
       LEATHER BINDER A5 — Blueprint Isometric Exploded View
       6-ring binder, vegetable leather, Warm Leather color
       Color: #003DA5 (Blueprint Blue), stroke only
       ============================================================ -->

  <!-- ============================================================
       Layer 1: FRONT COVER (top, opened)
       ============================================================ -->
  <g>
    <!-- Cover top face (opened flat, angled) -->
    <polygon
      points="120,90 200,133 147,160 67,117"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.02)"
    />
    <!-- Cover left side (thickness) -->
    <polygon
      points="67,117 67,121 120,94 120,90"
      stroke="#003DA5" stroke-width="0.8"
      fill="rgba(0,61,165,0.04)"
    />

    <!-- Leather texture (cross-hatch) -->
    <g stroke="#003DA5" stroke-width="0.2" opacity="0.1">
      <line x1="85" y1="108" x2="140" y2="136" />
      <line x1="95" y1="103" x2="150" y2="131" />
      <line x1="105" y1="98" x2="160" y2="126" />
      <line x1="115" y1="93" x2="170" y2="121" />
      <line x1="100" y1="118" x2="155" y2="90" />
      <line x1="110" y1="123" x2="165" y2="95" />
      <line x1="120" y1="128" x2="175" y2="100" />
    </g>
  </g>

  <!-- ============================================================
       Layer 2: 6-RING MECHANISM (middle)
       ============================================================ -->
  <g>
    <!-- Spine bar -->
    <polygon
      points="200,165 206,162 206,250 200,253"
      stroke="#003DA5" stroke-width="0.8"
      fill="rgba(0,61,165,0.05)"
    />

    <!-- 6 Rings (open position) -->
    <g stroke="#003DA5" stroke-width="0.8" fill="none">
      <!-- Ring 1 -->
      <path d="M203,175 C190,175 185,170 185,165 C185,160 190,155 203,155" opacity="0.6" />
      <path d="M203,175 C216,175 221,170 221,165 C221,160 216,155 203,155" opacity="0.6" />

      <!-- Ring 2 -->
      <path d="M203,193 C190,193 185,188 185,183 C185,178 190,173 203,173" opacity="0.6" />
      <path d="M203,193 C216,193 221,188 221,183 C221,178 216,173 203,173" opacity="0.6" />

      <!-- Ring 3 -->
      <path d="M203,211 C190,211 185,206 185,201 C185,196 190,191 203,191" opacity="0.6" />
      <path d="M203,211 C216,211 221,206 221,201 C221,196 216,191 203,191" opacity="0.6" />

      <!-- Ring 4 -->
      <path d="M203,229 C190,229 185,224 185,219 C185,214 190,209 203,209" opacity="0.6" />
      <path d="M203,229 C216,229 221,224 221,219 C221,214 216,209 203,209" opacity="0.6" />

      <!-- Ring 5 -->
      <path d="M203,247 C190,247 185,242 185,237 C185,232 190,227 203,227" opacity="0.6" />
      <path d="M203,247 C216,247 221,242 221,237 C221,232 216,227 203,227" opacity="0.6" />

      <!-- Ring 6 -->
      <path d="M203,265 C190,265 185,260 185,255 C185,250 190,245 203,245" opacity="0.6" />
      <path d="M203,265 C216,265 221,260 221,255 C221,250 216,245 203,245" opacity="0.6" />
    </g>

    <!-- Ring mechanism lever -->
    <rect x="199" y="205" width="8" height="10" rx="1"
      stroke="#003DA5" stroke-width="0.5" fill="rgba(0,61,165,0.03)" opacity="0.5" />
  </g>

  <!-- ============================================================
       Layer 3: REFILL PAGES (fanned, between rings)
       ============================================================ -->
  <g opacity="0.35">
    <!-- Page stack (isometric rectangle) -->
    <polygon
      points="220,185 285,152 240,128 175,161"
      stroke="#003DA5" stroke-width="0.6"
      fill="rgba(0,61,165,0.02)"
    />
    <!-- Page holes (6) -->
    <circle cx="222" cy="184" r="2" stroke="#003DA5" stroke-width="0.4" fill="none" />
    <circle cx="218" cy="196" r="2" stroke="#003DA5" stroke-width="0.4" fill="none" />
    <circle cx="225" cy="176" r="2" stroke="#003DA5" stroke-width="0.4" fill="none" />

    <!-- Grid lines on page -->
    <g stroke="#003DA5" stroke-width="0.2" opacity="0.3">
      <line x1="230" y1="178" x2="275" y2="155" />
      <line x1="228" y1="172" x2="268" y2="150" />
      <line x1="240" y1="170" x2="195" y2="150" />
      <line x1="255" y1="162" x2="210" y2="142" />
    </g>
  </g>

  <!-- ============================================================
       Layer 4: BACK COVER (bottom)
       ============================================================ -->
  <g>
    <!-- Cover top face -->
    <polygon
      points="200,330 280,287 222,260 142,303"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.02)"
    />
    <!-- Right side -->
    <polygon
      points="200,330 280,287 280,291 200,334"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.05)"
    />
    <!-- Left side -->
    <polygon
      points="200,330 142,303 142,307 200,334"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.04)"
    />

    <!-- Leather texture -->
    <g stroke="#003DA5" stroke-width="0.2" opacity="0.08">
      <line x1="160" y1="315" x2="260" y2="295" />
      <line x1="165" y1="310" x2="265" y2="290" />
      <line x1="170" y1="305" x2="270" y2="285" />
      <line x1="155" y1="320" x2="255" y2="300" />
    </g>
  </g>

  <!-- ============================================================
       Alignment guides
       ============================================================ -->
  <g stroke="#003DA5" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.2">
    <!-- Cover to rings -->
    <line x1="200" y1="138" x2="200" y2="160" />
    <!-- Rings to back cover -->
    <line x1="200" y1="270" x2="200" y2="325" />
  </g>

  <!-- ============================================================
       Annotations
       ============================================================ -->
  <g>
    <line x1="67" y1="117" x2="40" y2="117"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="67" cy="117" r="1.5" fill="#003DA5" />
    <text x="15" y="112" font-family="'VT323', monospace" font-size="6" fill="#003DA5">FRONT</text>
    <text x="15" y="122" font-family="'VT323', monospace" font-size="6" fill="#003DA5" opacity="0.5">VEG LEATHER</text>

    <line x1="221" y1="200" x2="290" y2="200"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="221" cy="200" r="1.5" fill="#003DA5" />
    <text x="294" y="198" font-family="'VT323', monospace" font-size="7" fill="#003DA5">6-RING</text>
    <text x="294" y="208" font-family="'VT323', monospace" font-size="6" fill="#003DA5" opacity="0.5">MECHANISM</text>

    <line x1="285" y1="152" x2="310" y2="152"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="285" cy="152" r="1.5" fill="#003DA5" />
    <text x="314" y="150" font-family="'VT323', monospace" font-size="7" fill="#003DA5" opacity="0.5">REFILL PAGES</text>

    <line x1="280" y1="289" x2="310" y2="289"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="280" cy="289" r="1.5" fill="#003DA5" />
    <text x="314" y="287" font-family="'VT323', monospace" font-size="7" fill="#003DA5">BACK COVER</text>
  </g>

  <!-- ============================================================
       Title
       ============================================================ -->
  <text x="200" y="470"
    font-family="'VT323', monospace" font-size="8" fill="#003DA5"
    text-anchor="middle" letter-spacing="0.1em">
    LEATHER BINDER A5
  </text>

</svg>
