<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">

  <!-- ============================================================
       BRAND HERO — "The Blueprint Desk"
       설계자의 책상: 도면 위에 펜, 노트북, 잉크가 배치된 등각투영 구성도
       Color: #003DA5 (Blueprint Blue), stroke only
       Perspective: 30° true isometric
       ============================================================ -->

  <defs>
    <clipPath id="hero-notebook-clip">
      <polygon points="160,220 250,168 210,148 120,200" />
    </clipPath>
    <clipPath id="hero-mat-clip">
      <polygon points="300,280 480,176 400,130 220,234" />
    </clipPath>
  </defs>

  <!-- ============================================================
       Base: DESK MAT (large, background)
       ============================================================ -->
  <g>
    <polygon
      points="300,280 480,176 400,130 220,234"
      stroke="#003DA5" stroke-width="0.8"
      fill="rgba(0,61,165,0.015)"
    />
    <!-- Grid on mat -->
    <g clip-path="url(#hero-mat-clip)" stroke="#003DA5" stroke-width="0.2" opacity="0.12">
      <line x1="290" y1="274" x2="470" y2="170" />
      <line x1="280" y1="268" x2="460" y2="164" />
      <line x1="270" y1="262" x2="450" y2="158" />
      <line x1="260" y1="256" x2="440" y2="152" />
      <line x1="250" y1="250" x2="430" y2="146" />
      <line x1="240" y1="244" x2="420" y2="140" />
      <line x1="230" y1="238" x2="410" y2="134" />
      <line x1="320" y1="270" x2="240" y2="225" />
      <line x1="340" y1="258" x2="260" y2="213" />
      <line x1="360" y1="246" x2="280" y2="201" />
      <line x1="380" y1="234" x2="300" y2="189" />
      <line x1="400" y1="222" x2="320" y2="177" />
      <line x1="420" y1="210" x2="340" y2="165" />
      <line x1="440" y1="198" x2="360" y2="153" />
      <line x1="460" y1="186" x2="380" y2="141" />
    </g>
    <!-- Mat edge -->
    <polygon
      points="300,280 480,176 480,179 300,283"
      stroke="#003DA5" stroke-width="0.8"
      fill="rgba(0,61,165,0.03)"
    />
    <polygon
      points="300,280 220,234 220,237 300,283"
      stroke="#003DA5" stroke-width="0.8"
      fill="rgba(0,61,165,0.025)"
    />
  </g>

  <!-- ============================================================
       Object 1: NOTEBOOK (left, on mat)
       ============================================================ -->
  <g>
    <!-- Cover top -->
    <polygon
      points="160,220 250,168 210,148 120,200"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.02)"
    />
    <!-- Grid on notebook -->
    <g clip-path="url(#hero-notebook-clip)" stroke="#003DA5" stroke-width="0.3" opacity="0.2">
      <line x1="152" y1="216" x2="242" y2="164" />
      <line x1="144" y1="212" x2="234" y2="160" />
      <line x1="136" y1="208" x2="226" y2="156" />
      <line x1="128" y1="204" x2="218" y2="152" />
      <line x1="175" y1="214" x2="133" y2="191" />
      <line x1="190" y1="206" x2="148" y2="183" />
      <line x1="205" y1="198" x2="163" y2="175" />
      <line x1="220" y1="190" x2="178" y2="167" />
      <line x1="235" y1="182" x2="193" y2="159" />
    </g>
    <!-- Right side -->
    <polygon
      points="160,220 250,168 250,175 160,227"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.04)"
    />
    <!-- Left side -->
    <polygon
      points="160,220 120,200 120,207 160,227"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.03)"
    />
    <!-- Page edges (left side) -->
    <g stroke="#003DA5" stroke-width="0.3" opacity="0.25">
      <line x1="160" y1="222" x2="120" y2="202" />
      <line x1="160" y1="224" x2="120" y2="204" />
    </g>
  </g>

  <!-- ============================================================
       Object 2: FOUNTAIN PEN (diagonal, on notebook)
       ============================================================ -->
  <g>
    <!-- Pen body -->
    <line x1="145" y1="210" x2="215" y2="170" stroke="#003DA5" stroke-width="1.2" />
    <line x1="146" y1="212" x2="216" y2="172" stroke="#003DA5" stroke-width="1.2" />
    <!-- Cap -->
    <line x1="215" y1="170" x2="238" y2="157" stroke="#003DA5" stroke-width="1.5" />
    <line x1="216" y1="172" x2="239" y2="159" stroke="#003DA5" stroke-width="1.5" />
    <!-- Cap top -->
    <ellipse cx="238.5" cy="158" rx="1.5" ry="0.8" stroke="#003DA5" stroke-width="0.6" />
    <!-- Nib -->
    <line x1="145" y1="210" x2="138" y2="214" stroke="#003DA5" stroke-width="0.8" />
    <line x1="146" y1="212" x2="138" y2="214" stroke="#003DA5" stroke-width="0.8" />
    <!-- Clip -->
    <line x1="238" y1="158" x2="222" y2="167" stroke="#003DA5" stroke-width="0.5" opacity="0.5" />
  </g>

  <!-- ============================================================
       Object 3: INK BOTTLE (right side, on mat)
       ============================================================ -->
  <g>
    <!-- Bottle body (hexagonal prism) -->
    <polygon
      points="400,200 418,190 418,210 400,220 382,210 382,190"
      stroke="#003DA5" stroke-width="0.8"
      fill="rgba(0,61,165,0.02)"
    />
    <!-- Ink level -->
    <polygon
      points="400,208 414,200 414,210 400,218 386,210 386,200"
      stroke="none"
      fill="rgba(0,61,165,0.05)"
    />
    <!-- Bottle neck -->
    <ellipse cx="400" cy="190" rx="7" ry="3.5" stroke="#003DA5" stroke-width="0.6" fill="rgba(0,61,165,0.02)" />
    <!-- Cap -->
    <rect x="395" y="182" width="10" height="8" rx="1"
      stroke="#003DA5" stroke-width="0.6" fill="rgba(0,61,165,0.03)" />
    <ellipse cx="400" cy="182" rx="5" ry="2.5" stroke="#003DA5" stroke-width="0.5" fill="rgba(0,61,165,0.02)" />
    <!-- Label -->
    <line x1="388" y1="205" x2="412" y2="205" stroke="#003DA5" stroke-width="0.3" opacity="0.3" />
    <line x1="390" y1="208" x2="410" y2="208" stroke="#003DA5" stroke-width="0.3" opacity="0.3" />
  </g>

  <!-- ============================================================
       Object 4: CARTRIDGES (scattered near ink bottle)
       ============================================================ -->
  <g opacity="0.4">
    <!-- Cartridge 1 -->
    <ellipse cx="440" cy="218" rx="2.5" ry="1.2" stroke="#003DA5" stroke-width="0.5" />
    <line x1="437.5" y1="218" x2="437.5" y2="228" stroke="#003DA5" stroke-width="0.5" />
    <line x1="442.5" y1="218" x2="442.5" y2="228" stroke="#003DA5" stroke-width="0.5" />
    <ellipse cx="440" cy="228" rx="2.5" ry="1.2" stroke="#003DA5" stroke-width="0.5" />

    <!-- Cartridge 2 (angled) -->
    <line x1="450" y1="210" x2="456" y2="224" stroke="#003DA5" stroke-width="0.5" />
    <line x1="454" y1="209" x2="460" y2="223" stroke="#003DA5" stroke-width="0.5" />
    <ellipse cx="452" cy="209.5" rx="2.5" ry="1.2" stroke="#003DA5" stroke-width="0.4"
      transform="rotate(-70, 452, 209.5)" />
  </g>

  <!-- ============================================================
       Object 5: MEMO PAD (lower-left, partially under notebook)
       ============================================================ -->
  <g opacity="0.35">
    <polygon
      points="100,252 150,223 130,213 80,242"
      stroke="#003DA5" stroke-width="0.6"
      fill="rgba(0,61,165,0.02)"
    />
    <!-- Grid lines on memo -->
    <g stroke="#003DA5" stroke-width="0.2" opacity="0.3">
      <line x1="95" y1="248" x2="145" y2="219" />
      <line x1="90" y1="245" x2="140" y2="216" />
      <line x1="110" y1="246" x2="90" y2="236" />
      <line x1="125" y1="238" x2="105" y2="228" />
    </g>
  </g>

  <!-- ============================================================
       Object 6: RULER / STRAIGHTEDGE (lower right)
       ============================================================ -->
  <g opacity="0.3">
    <line x1="340" y1="260" x2="460" y2="192" stroke="#003DA5" stroke-width="1" />
    <line x1="341" y1="263" x2="461" y2="195" stroke="#003DA5" stroke-width="1" />
    <!-- Tick marks -->
    <g stroke="#003DA5" stroke-width="0.3">
      <line x1="355" y1="253" x2="356" y2="256" />
      <line x1="370" y1="244" x2="371" y2="247" />
      <line x1="385" y1="236" x2="386" y2="239" />
      <line x1="400" y1="227" x2="401" y2="230" />
      <line x1="415" y1="219" x2="416" y2="222" />
      <line x1="430" y1="210" x2="431" y2="213" />
      <line x1="445" y1="202" x2="446" y2="205" />
    </g>
  </g>

  <!-- ============================================================
       Annotations (sparse, editorial)
       ============================================================ -->
  <g>
    <!-- Notebook annotation -->
    <line x1="120" y1="200" x2="70" y2="170"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.4" />
    <text x="30" y="168"
      font-family="'VT323', monospace" font-size="6" fill="#003DA5" opacity="0.5">
      GRID NOTEBOOK
    </text>

    <!-- Pen annotation -->
    <line x1="238" y1="157" x2="268" y2="140"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.4" />
    <text x="272" y="138"
      font-family="'VT323', monospace" font-size="6" fill="#003DA5" opacity="0.5">
      FOUNTAIN PEN
    </text>

    <!-- Ink annotation -->
    <line x1="418" y1="190" x2="450" y2="175"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.4" />
    <text x="454" y="173"
      font-family="'VT323', monospace" font-size="6" fill="#003DA5" opacity="0.5">
      BLUEPRINT BLUE
    </text>

    <!-- Mat annotation -->
    <line x1="480" y1="176" x2="510" y2="160"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.4" />
    <text x="514" y="158"
      font-family="'VT323', monospace" font-size="6" fill="#003DA5" opacity="0.5">
      DESK MAT
    </text>
  </g>

  <!-- ============================================================
       Title block (bottom-right, technical drawing style)
       ============================================================ -->
  <g>
    <rect x="440" y="330" width="140" height="50" rx="0"
      stroke="#003DA5" stroke-width="0.5" fill="none" opacity="0.3" />
    <line x1="440" y1="348" x2="580" y2="348"
      stroke="#003DA5" stroke-width="0.3" opacity="0.3" />
    <text x="450" y="344"
      font-family="'VT323', monospace" font-size="6" fill="#003DA5" opacity="0.4">
      DRAFT.
    </text>
    <text x="450" y="362"
      font-family="'VT323', monospace" font-size="5" fill="#003DA5" opacity="0.3">
      THE BLUEPRINT DESK
    </text>
    <text x="450" y="374"
      font-family="'VT323', monospace" font-size="5" fill="#003DA5" opacity="0.3">
      ISOMETRIC ASSEMBLY VIEW
    </text>
  </g>

</svg>
