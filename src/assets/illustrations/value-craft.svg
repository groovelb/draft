<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">

  <!-- ============================================================
       CORE VALUE: CRAFT — 도구에 대한 존중
       등각투영 만년필 닙 단면도. 잉크 채널, 피드 구조, 모세관 작용.
       닙 끝에서 잉크가 종이에 전달되는 0.3초의 순간.
       Color: #003DA5 (Blueprint Blue), stroke only
       Perspective: 30° true isometric cross-section
       ============================================================ -->

  <defs>
    <!-- Cross-hatch pattern for section view -->
    <pattern id="craft-section-hatch" width="5" height="5"
      patternUnits="userSpaceOnUse"
      patternTransform="rotate(-45)">
      <line x1="0" y1="0" x2="0" y2="5"
        stroke="#003DA5" stroke-width="0.4" opacity="0.15" />
    </pattern>

    <!-- Clip path for detail callout inset -->
    <clipPath id="craft-inset-clip">
      <circle cx="330" cy="285" r="48" />
    </clipPath>
  </defs>

  <!-- ============================================================
       Layer 1: NIB (large, cross-section view, isometric)
       Shield-shaped nib tilted at isometric angle
       Left half: exterior view, Right half: section cut
       ============================================================ -->
  <g>
    <!-- Nib outline (shield shape, large scale) -->
    <path d="M170,80 L200,265 L230,80"
      stroke="#003DA5" stroke-width="1.2" fill="rgba(0,61,165,0.02)" />

    <!-- Top curvature of nib -->
    <path d="M175,90 Q200,82 225,90"
      stroke="#003DA5" stroke-width="0.6" fill="none" opacity="0.4" />
    <path d="M178,100 Q200,92 222,100"
      stroke="#003DA5" stroke-width="0.5" fill="none" opacity="0.3" />
    <path d="M181,112 Q200,104 219,112"
      stroke="#003DA5" stroke-width="0.5" fill="none" opacity="0.25" />

    <!-- Section cut surface (right half, with cross-hatch) -->
    <path d="M200,90 L200,260 L230,80 Z"
      fill="url(#craft-section-hatch)" stroke="none" />

    <!-- Section cut line (heavy, center) -->
    <line x1="200" y1="80" x2="200" y2="268"
      stroke="#003DA5" stroke-width="1" opacity="0.6" />

    <!-- Slit (visible on left half exterior) -->
    <line x1="200" y1="105" x2="200" y2="258"
      stroke="#003DA5" stroke-width="0.5" opacity="0.3" />

    <!-- Breather hole -->
    <circle cx="200" cy="112" r="6"
      stroke="#003DA5" stroke-width="0.8" fill="rgba(0,61,165,0.02)" />
    <!-- Breather hole center dot -->
    <circle cx="200" cy="112" r="1" fill="#003DA5" opacity="0.2" />

    <!-- Tipping material at nib end -->
    <ellipse cx="200" cy="268" rx="5" ry="2.5"
      stroke="#003DA5" stroke-width="0.8" fill="rgba(0,61,165,0.04)" />
  </g>

  <!-- ============================================================
       Layer 2: INK CHANNEL & FEED STRUCTURE (cross-section detail)
       Visible inside the sectioned right half
       ============================================================ -->
  <g>
    <!-- Main ink channel (center line through nib) -->
    <line x1="200" y1="115" x2="200" y2="260"
      stroke="#003DA5" stroke-width="0.8" opacity="0.4"
      stroke-dasharray="1 1.5" />

    <!-- Feed body (behind nib, visible in section) -->
    <path d="M205,120 Q210,115 210,130 L208,255"
      stroke="#003DA5" stroke-width="0.6" fill="none" opacity="0.3" />
    <path d="M215,120 Q220,115 220,130 L215,250"
      stroke="#003DA5" stroke-width="0.6" fill="none" opacity="0.2" />

    <!-- Capillary grooves on feed (fine parallel lines) -->
    <g stroke="#003DA5" stroke-width="0.3" opacity="0.2">
      <line x1="208" y1="135" x2="218" y2="135" />
      <line x1="208" y1="145" x2="217" y2="145" />
      <line x1="208" y1="155" x2="217" y2="155" />
      <line x1="208" y1="165" x2="216" y2="165" />
      <line x1="208" y1="175" x2="216" y2="175" />
      <line x1="207" y1="185" x2="215" y2="185" />
      <line x1="207" y1="195" x2="215" y2="195" />
      <line x1="207" y1="205" x2="214" y2="205" />
      <line x1="206" y1="215" x2="214" y2="215" />
      <line x1="206" y1="225" x2="213" y2="225" />
      <line x1="205" y1="235" x2="212" y2="235" />
      <line x1="205" y1="245" x2="211" y2="245" />
    </g>

    <!-- Ink flow direction arrows (subtle) -->
    <g fill="#003DA5" opacity="0.15">
      <polygon points="200,150 198,145 202,145" />
      <polygon points="200,190 198,185 202,185" />
      <polygon points="200,230 198,225 202,225" />
    </g>
  </g>

  <!-- ============================================================
       Layer 3: PAPER SURFACE (beneath nib, isometric)
       ============================================================ -->
  <g>
    <!-- Paper surface (isometric quadrilateral) -->
    <polygon
      points="200,290 300,232 240,200 140,258"
      stroke="#003DA5" stroke-width="0.6"
      fill="rgba(0,61,165,0.015)"
    />

    <!-- Paper fiber texture -->
    <g stroke="#003DA5" stroke-width="0.15" opacity="0.06">
      <line x1="155" y1="255" x2="285" y2="230" />
      <line x1="150" y1="260" x2="280" y2="235" />
      <line x1="145" y1="265" x2="275" y2="240" />
      <line x1="160" y1="270" x2="290" y2="245" />
      <line x1="165" y1="275" x2="295" y2="250" />
    </g>

    <!-- Ink contact point (where nib meets paper) -->
    <circle cx="200" cy="275" r="4"
      fill="#003DA5" opacity="0.12" />

    <!-- Ink spreading ripple effect (isometric ellipses) -->
    <ellipse cx="200" cy="277" rx="8" ry="4"
      stroke="#003DA5" stroke-width="0.5" fill="none" opacity="0.2" />
    <ellipse cx="200" cy="279" rx="14" ry="7"
      stroke="#003DA5" stroke-width="0.4" fill="none" opacity="0.12" />
    <ellipse cx="200" cy="281" rx="22" ry="10"
      stroke="#003DA5" stroke-width="0.3" fill="none" opacity="0.06" />

    <!-- Ink line being drawn on paper -->
    <path d="M200,275 Q215,272 240,268 Q265,264 285,262"
      stroke="#003DA5" stroke-width="1" fill="none" opacity="0.25"
      stroke-linecap="round" />
  </g>

  <!-- ============================================================
       Layer 4: DETAIL CALLOUT (magnified nib tip + ink transfer)
       Source: circle at nib tip → Inset circle (lower-right)
       ============================================================ -->
  <g>
    <!-- Source circle around nib tip area -->
    <circle cx="200" cy="270" r="14"
      stroke="#003DA5" stroke-width="0.6" stroke-dasharray="4 2"
      fill="none" opacity="0.4" />

    <!-- Leader line from source to inset -->
    <line x1="212" y1="278" x2="288" y2="290"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.3" />

    <!-- Magnified inset circle (lower-right) -->
    <circle cx="330" cy="285" r="48"
      stroke="#003DA5" stroke-width="0.8"
      fill="rgba(0,61,165,0.01)" />

    <!-- Magnified content inside inset -->
    <g clip-path="url(#craft-inset-clip)">
      <!-- Magnified tipping (5x scale) -->
      <ellipse cx="330" cy="270" rx="18" ry="8"
        stroke="#003DA5" stroke-width="0.8" fill="rgba(0,61,165,0.03)" />

      <!-- Magnified paper surface line -->
      <line x1="285" y1="295" x2="375" y2="295"
        stroke="#003DA5" stroke-width="0.5" opacity="0.3" />

      <!-- Ink bridge (meniscus between tip and paper) -->
      <path d="M325,278 Q330,295 335,278"
        stroke="#003DA5" stroke-width="0.6" fill="rgba(0,61,165,0.06)" opacity="0.5" />

      <!-- Ink spreading on paper (magnified) -->
      <ellipse cx="330" cy="298" rx="10" ry="3"
        stroke="#003DA5" stroke-width="0.5" fill="rgba(0,61,165,0.08)" opacity="0.3" />

      <!-- Gap indicator (nib to paper distance) -->
      <line x1="340" y1="278" x2="340" y2="295"
        stroke="#003DA5" stroke-width="0.4" opacity="0.3" />
      <line x1="338" y1="278" x2="342" y2="278" stroke="#003DA5" stroke-width="0.3" opacity="0.3" />
      <line x1="338" y1="295" x2="342" y2="295" stroke="#003DA5" stroke-width="0.3" opacity="0.3" />

      <!-- Time annotation in inset -->
      <text x="348" y="288"
        font-family="'VT323', monospace" font-size="5" fill="#003DA5" opacity="0.5">
        0.3s
      </text>
    </g>

    <!-- Inset label -->
    <text x="330" y="340"
      font-family="'VT323', monospace" font-size="5" fill="#003DA5"
      text-anchor="middle" opacity="0.4">
      DETAIL (5:1)
    </text>
  </g>

  <!-- ============================================================
       Layer 5: GHOST ELEMENTS
       Ink bottle with dashed supply chain line
       ============================================================ -->
  <g opacity="0.15">
    <!-- Ink bottle silhouette (upper-left) -->
    <!-- Bottle body -->
    <rect x="50" y="90" width="24" height="30" rx="2"
      stroke="#003DA5" stroke-width="0.8" fill="none" />
    <!-- Bottle neck -->
    <rect x="56" y="80" width="12" height="12" rx="1"
      stroke="#003DA5" stroke-width="0.6" fill="none" />
    <!-- Ink level -->
    <rect x="52" y="105" width="20" height="13"
      fill="rgba(0,61,165,0.1)" stroke="none" />
    <!-- Bottle cap -->
    <line x1="55" y1="80" x2="69" y2="80"
      stroke="#003DA5" stroke-width="0.8" />
  </g>
  <!-- Supply chain dashed line (bottle → nib) -->
  <line x1="74" y1="105" x2="195" y2="115"
    stroke="#003DA5" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.08" />

  <!-- ============================================================
       Annotations: Leader lines + Labels
       ============================================================ -->
  <g>
    <!-- CAPILLARY FEED label (right side) -->
    <line x1="218" y1="175" x2="280" y2="170"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="218" cy="175" r="1.5" fill="#003DA5" />
    <text x="284" y="168"
      font-family="'VT323', monospace" font-size="7" fill="#003DA5">
      CAPILLARY FEED
    </text>
    <text x="284" y="178"
      font-family="'VT323', monospace" font-size="6" fill="#003DA5" opacity="0.5">
      12 GROOVES
    </text>

    <!-- INK CHANNEL label (left side) -->
    <line x1="195" y1="190" x2="95" y2="190"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="195" cy="190" r="1.5" fill="#003DA5" />
    <text x="30" y="188"
      font-family="'VT323', monospace" font-size="7" fill="#003DA5">
      INK CHANNEL
    </text>
    <text x="30" y="198"
      font-family="'VT323', monospace" font-size="6" fill="#003DA5" opacity="0.5">
      CAPILLARY ACTION
    </text>

    <!-- TIPPING label -->
    <line x1="205" y1="268" x2="120" y2="295"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="205" cy="268" r="1.5" fill="#003DA5" />
    <text x="55" y="293"
      font-family="'VT323', monospace" font-size="7" fill="#003DA5">
      TIPPING
    </text>
    <text x="55" y="303"
      font-family="'VT323', monospace" font-size="6" fill="#003DA5" opacity="0.5">
      IRIDIUM ALLOY
    </text>

    <!-- 0.3 SEC TRANSFER label -->
    <line x1="200" y1="277" x2="120" y2="325"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="200" cy="277" r="1.5" fill="#003DA5" />
    <text x="55" y="323"
      font-family="'VT323', monospace" font-size="7" fill="#003DA5">
      0.3 SEC TRANSFER
    </text>
    <text x="55" y="333"
      font-family="'VT323', monospace" font-size="6" fill="#003DA5" opacity="0.5">
      INK ABSORPTION
    </text>

    <!-- SECTION A-A label (top) -->
    <text x="170" y="72"
      font-family="'VT323', monospace" font-size="6" fill="#003DA5" opacity="0.5">
      A
    </text>
    <line x1="170" y1="75" x2="170" y2="85"
      stroke="#003DA5" stroke-width="0.6" opacity="0.4" />
    <text x="230" y="72"
      font-family="'VT323', monospace" font-size="6" fill="#003DA5" opacity="0.5">
      A
    </text>
    <line x1="230" y1="75" x2="230" y2="85"
      stroke="#003DA5" stroke-width="0.6" opacity="0.4" />
    <!-- Section cut indicator line -->
    <line x1="170" y1="78" x2="230" y2="78"
      stroke="#003DA5" stroke-width="0.8" stroke-dasharray="20 5 5 5"
      opacity="0.3" />
  </g>

  <!-- ============================================================
       Dimension lines
       ============================================================ -->
  <g>
    <!-- Nib slit width -->
    <g stroke="#003DA5" stroke-width="0.4" opacity="0.35">
      <line x1="170" y1="140" x2="230" y2="140" stroke-dasharray="2 2" />
      <line x1="170" y1="138" x2="170" y2="142" />
      <line x1="230" y1="138" x2="230" y2="142" />
    </g>
    <text x="200" y="136"
      font-family="'VT323', monospace" font-size="5" fill="#003DA5" opacity="0.4"
      text-anchor="middle">
      NIB WIDTH
    </text>

    <!-- Feed groove spacing -->
    <g stroke="#003DA5" stroke-width="0.4" opacity="0.35">
      <line x1="225" y1="165" x2="225" y2="175" stroke-dasharray="2 2" />
      <line x1="223" y1="165" x2="227" y2="165" />
      <line x1="223" y1="175" x2="227" y2="175" />
    </g>
    <text x="232" y="173"
      font-family="'VT323', monospace" font-size="4" fill="#003DA5" opacity="0.35">
      1MM
    </text>
  </g>

  <!-- ============================================================
       Title
       ============================================================ -->
  <text x="200" y="380"
    font-family="'VT323', monospace" font-size="8" fill="#003DA5"
    text-anchor="middle" letter-spacing="0.1em">
    CRAFT
  </text>

</svg>
