<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">

  <!-- ============================================================
       GRID MEMO PAD — Blueprint Isometric Exploded View
       Color: #003DA5 (Blueprint Blue), stroke only
       Perspective: 30° true isometric
       ============================================================ -->

  <defs>
    <!-- Clip path for top sheet grid pattern -->
    <clipPath id="sheet-clip">
      <polygon points="200,140 270,99 222,72 152,113" />
    </clipPath>
    <!-- Clip path for pad stack top face -->
    <clipPath id="pad-clip">
      <polygon points="200,290 275,247 222,217 147,260" />
    </clipPath>
  </defs>

  <!-- ============================================================
       Layer 1: TOP SHEET (떼어낸 한 장, 상단)
       Front corner: (200, 140), slightly rotated/lifted
       ============================================================ -->
  <g>
    <!-- Top face (the sheet) -->
    <polygon
      points="200,140 270,99 222,72 152,113"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.02)"
    />

    <!-- 5mm Grid pattern on sheet -->
    <g clip-path="url(#sheet-clip)" stroke="#003DA5" stroke-width="0.4" opacity="0.35">
      <!-- Set A: lines parallel to width -->
      <line x1="190" y1="134" x2="260" y2="93" />
      <line x1="181" y1="129" x2="251" y2="88" />
      <line x1="171" y1="123" x2="241" y2="82" />
      <line x1="162" y1="118" x2="232" y2="77" />
      <!-- Set B: lines parallel to depth -->
      <line x1="213" y1="133" x2="165" y2="106" />
      <line x1="225" y1="126" x2="177" y2="99" />
      <line x1="237" y1="120" x2="189" y2="93" />
      <line x1="249" y1="113" x2="201" y2="86" />
      <line x1="261" y1="107" x2="213" y2="80" />
    </g>

    <!-- Tear perforation line (dashed, along top edge) -->
    <line x1="152" y1="113" x2="200" y2="140"
      stroke="#003DA5" stroke-width="0.6" stroke-dasharray="2 2" opacity="0.5" />
  </g>

  <!-- ============================================================
       Layer 2: PAD STACK (메모 패드 100매 묶음, 중앙)
       Front corner: (200, 290), W=90, D=60, H=20
       ============================================================ -->
  <g>
    <!-- Top face -->
    <polygon
      points="200,290 275,247 222,217 147,260"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.02)"
    />

    <!-- Grid pattern on pad top face -->
    <g clip-path="url(#pad-clip)" stroke="#003DA5" stroke-width="0.4" opacity="0.25">
      <!-- Set A: lines parallel to width -->
      <line x1="190" y1="284" x2="265" y2="241" />
      <line x1="180" y1="278" x2="255" y2="235" />
      <line x1="170" y1="272" x2="245" y2="229" />
      <line x1="160" y1="266" x2="235" y2="223" />
      <!-- Set B: lines parallel to depth -->
      <line x1="213" y1="283" x2="160" y2="253" />
      <line x1="226" y1="276" x2="173" y2="246" />
      <line x1="239" y1="269" x2="186" y2="239" />
      <line x1="252" y1="262" x2="199" y2="232" />
      <line x1="265" y1="255" x2="212" y2="225" />
    </g>

    <!-- Right side face -->
    <polygon
      points="200,290 275,247 275,267 200,310"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.05)"
    />
    <!-- Page edge lines (right face) — 100 sheets compressed -->
    <g stroke="#003DA5" stroke-width="0.3" opacity="0.3">
      <line x1="200" y1="293" x2="275" y2="250" />
      <line x1="200" y1="296" x2="275" y2="253" />
      <line x1="200" y1="299" x2="275" y2="256" />
      <line x1="200" y1="302" x2="275" y2="259" />
      <line x1="200" y1="305" x2="275" y2="262" />
      <line x1="200" y1="308" x2="275" y2="265" />
    </g>

    <!-- Left side face -->
    <polygon
      points="200,290 147,260 147,280 200,310"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.04)"
    />
    <!-- Page edge lines (left face) -->
    <g stroke="#003DA5" stroke-width="0.3" opacity="0.3">
      <line x1="200" y1="293" x2="147" y2="263" />
      <line x1="200" y1="296" x2="147" y2="266" />
      <line x1="200" y1="299" x2="147" y2="269" />
      <line x1="200" y1="302" x2="147" y2="272" />
      <line x1="200" y1="305" x2="147" y2="275" />
      <line x1="200" y1="308" x2="147" y2="278" />
    </g>
  </g>

  <!-- ============================================================
       Layer 3: BACKING BOARD (하판, 하단)
       Front corner: (200, 395), W=92, D=62, H=4
       ============================================================ -->
  <g>
    <!-- Top face -->
    <polygon
      points="200,395 277,351 222,320 145,364"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.02)"
    />
    <!-- Right side face -->
    <polygon
      points="200,395 277,351 277,355 200,399"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.05)"
    />
    <!-- Left side face -->
    <polygon
      points="200,395 145,364 145,368 200,399"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.04)"
    />
  </g>

  <!-- ============================================================
       Alignment guide lines (dashed, between layers)
       ============================================================ -->
  <g stroke="#003DA5" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.2">
    <!-- Front corner: sheet to pad -->
    <line x1="200" y1="145" x2="200" y2="285" />
    <!-- Front corner: pad to backing -->
    <line x1="200" y1="315" x2="200" y2="390" />
    <!-- Right corner: sheet to pad -->
    <line x1="270" y1="104" x2="275" y2="242" />
    <!-- Right corner: pad to backing -->
    <line x1="275" y1="272" x2="277" y2="346" />
  </g>

  <!-- ============================================================
       Tear-off arrow (sheet being peeled)
       ============================================================ -->
  <g stroke="#003DA5" stroke-width="0.6" opacity="0.4">
    <!-- Curved arrow suggesting tear-off motion -->
    <path d="M 175,180 Q 165,165 170,148"
      fill="none" stroke-dasharray="2 2" />
    <!-- Arrowhead -->
    <polygon points="168,150 172,145 174,152" fill="#003DA5" opacity="0.4" />
  </g>

  <!-- ============================================================
       Annotations: Leader lines + Labels
       ============================================================ -->
  <g>
    <!-- TOP SHEET label -->
    <line x1="270" y1="99" x2="300" y2="99"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="270" cy="99" r="1.5" fill="#003DA5" />
    <text x="304" y="97"
      font-family="'Doto', monospace" font-size="12" fill="#003DA5">
      TEAR-OFF SHEET
    </text>
    <text x="304" y="107"
      font-family="'Doto', monospace" font-size="10" fill="#003DA5" opacity="0.5">
      5MM GRID
    </text>

    <!-- PAD STACK label -->
    <line x1="275" y1="257" x2="300" y2="257"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="275" cy="257" r="1.5" fill="#003DA5" />
    <text x="304" y="255"
      font-family="'Doto', monospace" font-size="12" fill="#003DA5">
      100 SHEETS
    </text>
    <text x="304" y="265"
      font-family="'Doto', monospace" font-size="10" fill="#003DA5" opacity="0.5">
      80GSM
    </text>

    <!-- BACKING BOARD label -->
    <line x1="277" y1="353" x2="300" y2="353"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="277" cy="353" r="1.5" fill="#003DA5" />
    <text x="304" y="356"
      font-family="'Doto', monospace" font-size="12" fill="#003DA5">
      BACKING BOARD
    </text>

    <!-- PERFORATION label (left side) -->
    <line x1="152" y1="113" x2="100" y2="113"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="152" cy="113" r="1.5" fill="#003DA5" />
    <text x="52" y="110"
      font-family="'Doto', monospace" font-size="12" fill="#003DA5">
      PERFORATION
    </text>
  </g>

  <!-- ============================================================
       Dimension lines
       ============================================================ -->
  <g stroke="#003DA5" stroke-width="0.5" opacity="0.4">
    <!-- Width dimension (along right direction, below backing) -->
    <line x1="196" y1="412" x2="204" y2="412" />
    <line x1="273" y1="368" x2="281" y2="368" />
    <line x1="200" y1="412" x2="277" y2="368" stroke-dasharray="2 2" />
  </g>
  <text x="230" y="400"
    font-family="'Doto', monospace" font-size="10" fill="#003DA5" opacity="0.5"
    transform="rotate(-30, 230, 400)">
    148MM
  </text>

  <g stroke="#003DA5" stroke-width="0.5" opacity="0.4">
    <!-- Depth dimension (along left direction, below backing) -->
    <line x1="196" y1="412" x2="204" y2="412" />
    <line x1="141" y1="381" x2="149" y2="381" />
    <line x1="200" y1="412" x2="145" y2="381" stroke-dasharray="2 2" />
  </g>
  <text x="163" y="403"
    font-family="'Doto', monospace" font-size="10" fill="#003DA5" opacity="0.5"
    transform="rotate(30, 163, 403)">
    105MM
  </text>

  <!-- ============================================================
       Title
       ============================================================ -->
  <text x="200" y="470"
    font-family="'Doto', monospace" font-size="14" fill="#003DA5"
    text-anchor="middle" letter-spacing="0.1em">
    GRID MEMO PAD
  </text>

</svg>
