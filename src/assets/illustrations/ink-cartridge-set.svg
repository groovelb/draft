<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">

  <!-- ============================================================
       INK CARTRIDGE SET — Blueprint Isometric View
       6 cartridges in packaging
       Color: #003DA5 (Blueprint Blue), stroke only
       ============================================================ -->

  <defs>
    <clipPath id="box-top-clip">
      <polygon points="200,200 300,143 240,110 140,167" />
    </clipPath>
  </defs>

  <!-- ============================================================
       Layer 1: SINGLE CARTRIDGE (exploded, top)
       Detailed view of one cartridge
       ============================================================ -->
  <g>
    <!-- Cartridge body (cylinder) -->
    <ellipse cx="200" cy="72" rx="6" ry="3" stroke="#003DA5" stroke-width="0.8" fill="rgba(0,61,165,0.02)" />
    <line x1="194" y1="72" x2="194" y2="132" stroke="#003DA5" stroke-width="0.8" />
    <line x1="206" y1="72" x2="206" y2="132" stroke="#003DA5" stroke-width="0.8" />
    <ellipse cx="200" cy="132" rx="6" ry="3" stroke="#003DA5" stroke-width="0.8" fill="rgba(0,61,165,0.02)" />

    <!-- Ink fill level -->
    <rect x="194" y="82" width="12" height="40" fill="rgba(0,61,165,0.06)" stroke="none" />

    <!-- Nipple/connector at bottom -->
    <line x1="198" y1="135" x2="198" y2="142" stroke="#003DA5" stroke-width="0.6" />
    <line x1="202" y1="135" x2="202" y2="142" stroke="#003DA5" stroke-width="0.6" />
    <ellipse cx="200" cy="142" rx="2" ry="1" stroke="#003DA5" stroke-width="0.5" fill="rgba(0,61,165,0.04)" />

    <!-- Seal at top -->
    <line x1="194" y1="74" x2="206" y2="74" stroke="#003DA5" stroke-width="0.4" opacity="0.4" />
  </g>

  <!-- ============================================================
       Layer 2: PACKAGING BOX (opened, middle-bottom)
       6 cartridges visible inside
       ============================================================ -->
  <g>
    <!-- Box - top face -->
    <polygon
      points="200,200 300,143 240,110 140,167"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.02)"
    />
    <!-- Box - right side -->
    <polygon
      points="200,200 300,143 300,178 200,235"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.05)"
    />
    <!-- Box - left side -->
    <polygon
      points="200,200 140,167 140,202 200,235"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.04)"
    />

    <!-- 6 Cartridges inside box (2 rows x 3) -->
    <!-- Row 1 -->
    <g stroke="#003DA5" stroke-width="0.6" opacity="0.6">
      <!-- Cartridge 1 -->
      <ellipse cx="175" cy="177" rx="4" ry="2" fill="rgba(0,61,165,0.04)" />
      <line x1="171" y1="177" x2="171" y2="190" />
      <line x1="179" y1="177" x2="179" y2="190" />
      <ellipse cx="175" cy="190" rx="4" ry="2" fill="rgba(0,61,165,0.04)" />

      <!-- Cartridge 2 -->
      <ellipse cx="195" cy="166" rx="4" ry="2" fill="rgba(0,61,165,0.04)" />
      <line x1="191" y1="166" x2="191" y2="179" />
      <line x1="199" y1="166" x2="199" y2="179" />
      <ellipse cx="195" cy="179" rx="4" ry="2" fill="rgba(0,61,165,0.04)" />

      <!-- Cartridge 3 -->
      <ellipse cx="215" cy="155" rx="4" ry="2" fill="rgba(0,61,165,0.04)" />
      <line x1="211" y1="155" x2="211" y2="168" />
      <line x1="219" y1="155" x2="219" y2="168" />
      <ellipse cx="215" cy="168" rx="4" ry="2" fill="rgba(0,61,165,0.04)" />
    </g>

    <!-- Row 2 -->
    <g stroke="#003DA5" stroke-width="0.6" opacity="0.4">
      <!-- Cartridge 4 -->
      <ellipse cx="190" cy="184" rx="4" ry="2" fill="rgba(0,61,165,0.03)" />
      <line x1="186" y1="184" x2="186" y2="197" />
      <line x1="194" y1="184" x2="194" y2="197" />
      <ellipse cx="190" cy="197" rx="4" ry="2" fill="rgba(0,61,165,0.03)" />

      <!-- Cartridge 5 -->
      <ellipse cx="210" cy="173" rx="4" ry="2" fill="rgba(0,61,165,0.03)" />
      <line x1="206" y1="173" x2="206" y2="186" />
      <line x1="214" y1="173" x2="214" y2="186" />
      <ellipse cx="210" cy="186" rx="4" ry="2" fill="rgba(0,61,165,0.03)" />

      <!-- Cartridge 6 -->
      <ellipse cx="230" cy="162" rx="4" ry="2" fill="rgba(0,61,165,0.03)" />
      <line x1="226" y1="162" x2="226" y2="175" />
      <line x1="234" y1="162" x2="234" y2="175" />
      <ellipse cx="230" cy="175" rx="4" ry="2" fill="rgba(0,61,165,0.03)" />
    </g>

    <!-- Box lid (opened, tilted behind) -->
    <g opacity="0.3">
      <polygon
        points="140,167 240,110 285,95 185,152"
        stroke="#003DA5" stroke-width="0.8"
        fill="rgba(0,61,165,0.01)"
      />
      <!-- Hinge line -->
      <line x1="140" y1="167" x2="240" y2="110"
        stroke="#003DA5" stroke-width="0.5" opacity="0.5" />
    </g>
  </g>

  <!-- ============================================================
       Alignment guide (cartridge to box)
       ============================================================ -->
  <g stroke="#003DA5" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.2">
    <line x1="200" y1="147" x2="195" y2="162" />
  </g>

  <!-- ============================================================
       Annotations
       ============================================================ -->
  <g>
    <!-- CARTRIDGE label -->
    <line x1="206" y1="100" x2="280" y2="100"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="206" cy="100" r="1.5" fill="#003DA5" />
    <text x="284" y="98" font-family="'Doto', monospace" font-size="7" fill="#003DA5">CARTRIDGE</text>
    <text x="284" y="108" font-family="'Doto', monospace" font-size="6" fill="#003DA5" opacity="0.5">BLUEPRINT BLUE</text>

    <!-- 6-PACK label -->
    <line x1="300" y1="160" x2="320" y2="160"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="300" cy="160" r="1.5" fill="#003DA5" />
    <text x="324" y="158" font-family="'Doto', monospace" font-size="7" fill="#003DA5">6 PACK</text>
    <text x="324" y="168" font-family="'Doto', monospace" font-size="6" fill="#003DA5" opacity="0.5">IN BOX</text>

    <!-- INK LEVEL label -->
    <line x1="194" y1="102" x2="130" y2="102"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="194" cy="102" r="1.5" fill="#003DA5" />
    <text x="84" y="100" font-family="'Doto', monospace" font-size="7" fill="#003DA5">INK</text>
    <text x="84" y="110" font-family="'Doto', monospace" font-size="6" fill="#003DA5" opacity="0.5">#003DA5</text>
  </g>

  <!-- ============================================================
       Title
       ============================================================ -->
  <text x="200" y="470"
    font-family="'Doto', monospace" font-size="8" fill="#003DA5"
    text-anchor="middle" letter-spacing="0.1em">
    INK CARTRIDGE SET
  </text>

</svg>
