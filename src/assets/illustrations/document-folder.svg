<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">

  <!-- ============================================================
       DOCUMENT FOLDER — Blueprint Isometric Exploded View
       A4 folder with 2 internal pockets
       Color: #003DA5 (Blueprint Blue), stroke only
       ============================================================ -->

  <!-- ============================================================
       Layer 1: FRONT FLAP (top, opened)
       ============================================================ -->
  <g>
    <polygon
      points="130,72 210,115 155,142 75,99"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.02)"
    />
    <!-- Fold crease -->
    <line x1="130" y1="72" x2="210" y2="115"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="4 2" opacity="0.3" />
  </g>

  <!-- ============================================================
       Layer 2: DOCUMENTS (peeking out, ghost)
       ============================================================ -->
  <g opacity="0.3">
    <!-- Document 1 (A4 paper) -->
    <polygon
      points="205,155 275,118 230,96 160,133"
      stroke="#003DA5" stroke-width="0.6"
      fill="rgba(0,61,165,0.02)"
    />
    <!-- Text lines on document -->
    <g stroke="#003DA5" stroke-width="0.3" opacity="0.4">
      <line x1="175" y1="128" x2="245" y2="95" />
      <line x1="180" y1="132" x2="250" y2="99" />
      <line x1="185" y1="136" x2="255" y2="103" />
      <line x1="190" y1="140" x2="240" y2="114" />
    </g>

    <!-- Document 2 (offset) -->
    <polygon
      points="210,162 280,125 235,103 165,140"
      stroke="#003DA5" stroke-width="0.5"
      fill="rgba(0,61,165,0.01)"
    />
  </g>

  <!-- ============================================================
       Layer 3: FOLDER BODY (main structure)
       ============================================================ -->
  <g>
    <!-- Outer face (top) -->
    <polygon
      points="200,215 290,168 230,138 140,185"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.02)"
    />
    <!-- Right side -->
    <polygon
      points="200,215 290,168 290,175 200,222"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.05)"
    />
    <!-- Left side -->
    <polygon
      points="200,215 140,185 140,192 200,222"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.04)"
    />

    <!-- Internal pocket 1 (left side, visible inside) -->
    <g opacity="0.5">
      <polygon
        points="160,198 200,215 200,210 160,193"
        stroke="#003DA5" stroke-width="0.6"
        fill="rgba(0,61,165,0.03)"
      />
      <!-- Pocket edge line -->
      <line x1="160" y1="193" x2="200" y2="210"
        stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 1" />
    </g>

    <!-- Internal pocket 2 (right side) -->
    <g opacity="0.5">
      <polygon
        points="200,215 240,196 240,190 200,209"
        stroke="#003DA5" stroke-width="0.6"
        fill="rgba(0,61,165,0.03)"
      />
      <line x1="200" y1="209" x2="240" y2="190"
        stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 1" />
    </g>
  </g>

  <!-- ============================================================
       Layer 4: BACK PANEL (bottom)
       ============================================================ -->
  <g>
    <polygon
      points="200,310 290,263 230,233 140,280"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.02)"
    />
    <polygon
      points="200,310 290,263 290,266 200,313"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.05)"
    />
    <polygon
      points="200,310 140,280 140,283 200,313"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.04)"
    />
  </g>

  <!-- ============================================================
       Alignment guides
       ============================================================ -->
  <g stroke="#003DA5" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.2">
    <line x1="200" y1="120" x2="200" y2="210" />
    <line x1="200" y1="227" x2="200" y2="305" />
    <line x1="290" y1="180" x2="290" y2="258" />
  </g>

  <!-- ============================================================
       Annotations
       ============================================================ -->
  <g>
    <line x1="75" y1="99" x2="45" y2="99"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="75" cy="99" r="1.5" fill="#003DA5" />
    <text x="10" y="97" font-family="'Doto', monospace" font-size="12" fill="#003DA5">FRONT FLAP</text>

    <line x1="275" y1="118" x2="310" y2="118"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="275" cy="118" r="1.5" fill="#003DA5" />
    <text x="314" y="116" font-family="'Doto', monospace" font-size="12" fill="#003DA5" opacity="0.5">A4 DOCS</text>

    <line x1="240" y1="193" x2="310" y2="193"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="240" cy="193" r="1.5" fill="#003DA5" />
    <text x="314" y="191" font-family="'Doto', monospace" font-size="12" fill="#003DA5">2 POCKETS</text>
    <text x="314" y="201" font-family="'Doto', monospace" font-size="10" fill="#003DA5" opacity="0.5">INTERNAL</text>

    <line x1="290" y1="264" x2="310" y2="264"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="290" cy="264" r="1.5" fill="#003DA5" />
    <text x="314" y="262" font-family="'Doto', monospace" font-size="12" fill="#003DA5">BACK PANEL</text>
  </g>

  <!-- ============================================================
       Dimension
       ============================================================ -->
  <g stroke="#003DA5" stroke-width="0.5" opacity="0.4">
    <line x1="200" y1="325" x2="290" y2="278"
      stroke-dasharray="2 2" />
    <line x1="198" y1="323" x2="202" y2="327" />
    <line x1="288" y1="276" x2="292" y2="280" />
  </g>
  <text x="242" y="310"
    font-family="'Doto', monospace" font-size="10" fill="#003DA5" opacity="0.5"
    transform="rotate(-30, 242, 310)">
    A4 SIZE
  </text>

  <!-- ============================================================
       Title
       ============================================================ -->
  <text x="200" y="470"
    font-family="'Doto', monospace" font-size="14" fill="#003DA5"
    text-anchor="middle" letter-spacing="0.1em">
    DOCUMENT FOLDER
  </text>

</svg>
