<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">

  <!-- ============================================================
       DESK MAT — Blueprint Isometric Technical Illustration
       600x400mm grid-printed desk mat
       Color: #003DA5 (Blueprint Blue), stroke only
       Perspective: 30° true isometric
       ============================================================ -->

  <defs>
    <clipPath id="mat-surface-clip">
      <polygon points="200,180 340,100 260,55 120,135" />
    </clipPath>
    <clipPath id="mat-curl-clip">
      <path d="M120,135 L200,180 L200,186 Q185,182 170,175 Q145,160 120,140 Z" />
    </clipPath>
  </defs>

  <!-- ============================================================
       Layer 1: MAT BODY (flat isometric rectangle)
       600x400mm → proportional W=140, D=80
       Front corner: (200, 180)
       ============================================================ -->
  <g>
    <!-- Top face (main surface) -->
    <polygon
      points="200,180 340,100 260,55 120,135"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.02)"
    />

    <!-- Grid pattern on surface -->
    <g clip-path="url(#mat-surface-clip)" stroke="#003DA5" stroke-width="0.3" opacity="0.2">
      <!-- Horizontal set (parallel to width edge) -->
      <line x1="193" y1="176" x2="333" y2="96" />
      <line x1="186" y1="172" x2="326" y2="92" />
      <line x1="179" y1="168" x2="319" y2="88" />
      <line x1="172" y1="164" x2="312" y2="84" />
      <line x1="165" y1="160" x2="305" y2="80" />
      <line x1="158" y1="156" x2="298" y2="76" />
      <line x1="151" y1="152" x2="291" y2="72" />
      <line x1="144" y1="148" x2="284" y2="68" />
      <line x1="137" y1="144" x2="277" y2="64" />
      <line x1="130" y1="140" x2="270" y2="60" />
      <!-- Vertical set (parallel to depth edge) -->
      <line x1="215" y1="175" x2="135" y2="130" />
      <line x1="230" y1="167" x2="150" y2="122" />
      <line x1="245" y1="159" x2="165" y2="114" />
      <line x1="260" y1="151" x2="180" y2="106" />
      <line x1="275" y1="143" x2="195" y2="98" />
      <line x1="290" y1="135" x2="210" y2="90" />
      <line x1="305" y1="127" x2="225" y2="82" />
      <line x1="320" y1="119" x2="240" y2="74" />
      <line x1="335" y1="111" x2="255" y2="66" />
    </g>

    <!-- Right side face (thin edge ~3mm) -->
    <polygon
      points="200,180 340,100 340,103 200,183"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.05)"
    />

    <!-- Left side face (thin edge) -->
    <polygon
      points="200,180 120,135 120,138 200,183"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.04)"
    />
  </g>

  <!-- ============================================================
       Layer 2: CORNER CURL (lower-left corner peeling up)
       Shows material thickness and flexibility
       ============================================================ -->
  <g>
    <path
      d="M120,135 Q130,128 140,132 Q155,140 170,150 Q185,160 200,168"
      stroke="#003DA5" stroke-width="0.6" fill="none" opacity="0.4"
    />
    <!-- Curl shadow line -->
    <path
      d="M122,137 Q132,132 142,136"
      stroke="#003DA5" stroke-width="0.4" fill="none" opacity="0.2"
    />
  </g>

  <!-- ============================================================
       Layer 3: OBJECTS ON MAT (context items, ghosted)
       ============================================================ -->
  <g opacity="0.15" stroke="#003DA5" stroke-width="0.6">
    <!-- Pen outline (simple cylinder on mat) -->
    <line x1="250" y1="120" x2="300" y2="92" />
    <line x1="251" y1="122" x2="301" y2="94" />
    <ellipse cx="250" cy="121" rx="1.5" ry="1" />

    <!-- Notebook outline (small rectangle on mat) -->
    <polygon points="170,155 210,132 195,123 155,146" />
  </g>

  <!-- ============================================================
       Annotations: Leader lines + Labels
       ============================================================ -->
  <g>
    <!-- SURFACE label -->
    <line x1="260" y1="55" x2="260" y2="32"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <line x1="260" y1="32" x2="310" y2="32"
      stroke="#003DA5" stroke-width="0.5" />
    <circle cx="260" cy="55" r="1.5" fill="#003DA5" />
    <text x="314" y="30"
      font-family="'Doto', monospace" font-size="12" fill="#003DA5">
      GRID SURFACE
    </text>
    <text x="314" y="40"
      font-family="'Doto', monospace" font-size="10" fill="#003DA5" opacity="0.5">
      5MM PRINT
    </text>

    <!-- MATERIAL label -->
    <line x1="340" y1="101" x2="355" y2="101"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="340" cy="101" r="1.5" fill="#003DA5" />
    <text x="358" y="99"
      font-family="'Doto', monospace" font-size="12" fill="#003DA5">
      PU LEATHER
    </text>
    <text x="358" y="109"
      font-family="'Doto', monospace" font-size="10" fill="#003DA5" opacity="0.5">
      3MM THICK
    </text>
  </g>

  <!-- ============================================================
       Dimension lines
       ============================================================ -->
  <g stroke="#003DA5" stroke-width="0.5" opacity="0.4">
    <!-- Width dimension (right edge) -->
    <line x1="200" y1="195" x2="340" y2="115"
      stroke-dasharray="2 2" />
    <line x1="198" y1="193" x2="202" y2="197" />
    <line x1="338" y1="113" x2="342" y2="117" />
  </g>
  <text x="265" y="163"
    font-family="'Doto', monospace" font-size="10" fill="#003DA5" opacity="0.5"
    transform="rotate(-30, 265, 163)">
    600MM
  </text>

  <g stroke="#003DA5" stroke-width="0.5" opacity="0.4">
    <!-- Depth dimension (left edge) -->
    <line x1="200" y1="195" x2="120" y2="150"
      stroke-dasharray="2 2" />
    <line x1="198" y1="193" x2="202" y2="197" />
    <line x1="118" y1="148" x2="122" y2="152" />
  </g>
  <text x="150" y="180"
    font-family="'Doto', monospace" font-size="10" fill="#003DA5" opacity="0.5"
    transform="rotate(30, 150, 180)">
    400MM
  </text>

  <!-- ============================================================
       Title
       ============================================================ -->
  <text x="200" y="470"
    font-family="'Doto', monospace" font-size="14" fill="#003DA5"
    text-anchor="middle" letter-spacing="0.1em">
    DESK MAT
  </text>

</svg>
