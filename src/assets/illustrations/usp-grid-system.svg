<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">

  <!-- ============================================================
       USP: 5MM GRID SYSTEM
       중심에서 확산하는 등각투영 그리드 패턴.
       Color: #003DA5 (Blueprint Blue), stroke only
       ============================================================ -->

  <defs>
    <clipPath id="grid-sys-diamond-clip">
      <polygon points="200,120 320,190 200,260 80,190" />
    </clipPath>
  </defs>

  <!-- Outer diamond boundary -->
  <polygon
    points="200,120 320,190 200,260 80,190"
    stroke="#003DA5" stroke-width="1"
    fill="rgba(0,61,165,0.015)"
  />

  <!-- Grid lines within diamond -->
  <g clip-path="url(#grid-sys-diamond-clip)">
    <g stroke="#003DA5" stroke-width="0.35" opacity="0.22">
      <line x1="80" y1="190" x2="200" y2="120" />
      <line x1="80" y1="200" x2="210" y2="125" />
      <line x1="80" y1="210" x2="220" y2="130" />
      <line x1="80" y1="220" x2="230" y2="135" />
      <line x1="80" y1="230" x2="240" y2="140" />
      <line x1="80" y1="240" x2="250" y2="145" />
      <line x1="90" y1="245" x2="260" y2="150" />
      <line x1="100" y1="250" x2="270" y2="155" />
      <line x1="110" y1="255" x2="280" y2="160" />
      <line x1="120" y1="260" x2="290" y2="165" />
      <line x1="130" y1="258" x2="300" y2="170" />
      <line x1="140" y1="256" x2="310" y2="175" />
      <line x1="150" y1="254" x2="320" y2="180" />
      <line x1="160" y1="252" x2="320" y2="190" />
    </g>
    <g stroke="#003DA5" stroke-width="0.35" opacity="0.22">
      <line x1="200" y1="120" x2="320" y2="190" />
      <line x1="190" y1="125" x2="320" y2="200" />
      <line x1="180" y1="130" x2="320" y2="210" />
      <line x1="170" y1="135" x2="310" y2="215" />
      <line x1="160" y1="140" x2="300" y2="220" />
      <line x1="150" y1="145" x2="290" y2="225" />
      <line x1="140" y1="150" x2="280" y2="230" />
      <line x1="130" y1="155" x2="270" y2="235" />
      <line x1="120" y1="160" x2="260" y2="240" />
      <line x1="110" y1="165" x2="250" y2="245" />
      <line x1="100" y1="170" x2="240" y2="250" />
      <line x1="90" y1="175" x2="230" y2="255" />
      <line x1="80" y1="180" x2="220" y2="260" />
      <line x1="80" y1="190" x2="200" y2="260" />
    </g>
  </g>

  <!-- Center crosshair -->
  <line x1="140" y1="190" x2="260" y2="190"
    stroke="#003DA5" stroke-width="0.8" opacity="0.4" />
  <line x1="200" y1="155" x2="200" y2="225"
    stroke="#003DA5" stroke-width="0.8" opacity="0.4" />

  <!-- Center dot -->
  <circle cx="200" cy="190" r="3"
    fill="#003DA5" opacity="0.25" />
  <circle cx="200" cy="190" r="1.2"
    fill="#003DA5" opacity="0.5" />

  <!-- Concentric diamond rings -->
  <polygon
    points="200,170 220,180 200,190 180,180"
    stroke="#003DA5" stroke-width="0.5" fill="none" opacity="0.3" />
  <polygon
    points="200,155 240,172 200,190 160,172"
    stroke="#003DA5" stroke-width="0.4" fill="none" opacity="0.2" />
  <polygon
    points="200,140 260,165 200,190 140,165"
    stroke="#003DA5" stroke-width="0.3" fill="none" opacity="0.12" />

  <!-- Ghost extension lines -->
  <g opacity="0.07">
    <line x1="200" y1="120" x2="200" y2="85"
      stroke="#003DA5" stroke-width="0.8" stroke-dasharray="4 3" />
    <line x1="320" y1="190" x2="350" y2="190"
      stroke="#003DA5" stroke-width="0.8" stroke-dasharray="4 3" />
    <line x1="200" y1="260" x2="200" y2="295"
      stroke="#003DA5" stroke-width="0.8" stroke-dasharray="4 3" />
    <line x1="80" y1="190" x2="50" y2="190"
      stroke="#003DA5" stroke-width="0.8" stroke-dasharray="4 3" />
    <polygon
      points="200,100 340,190 200,280 60,190"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="8 6"
      fill="none" />
  </g>

</svg>
