<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">

  <!-- ============================================================
       USP: QUIET LUXURY
       광활한 빈 공간 한가운데 단 하나의 원. 비움이 럭셔리.
       Color: #003DA5 (Blueprint Blue), stroke only
       ============================================================ -->

  <defs>
    <clipPath id="luxury-circle-clip">
      <circle cx="200" cy="190" r="36" />
    </clipPath>
  </defs>

  <!-- The single circle -->
  <circle cx="200" cy="190" r="36"
    stroke="#003DA5" stroke-width="1"
    fill="rgba(0,61,165,0.01)" />

  <!-- Inner diagonal hatching (texture) -->
  <g clip-path="url(#luxury-circle-clip)" stroke="#003DA5" stroke-width="0.2" opacity="0.08">
    <line x1="164" y1="155" x2="236" y2="227" />
    <line x1="170" y1="155" x2="236" y2="221" />
    <line x1="176" y1="155" x2="236" y2="215" />
    <line x1="182" y1="155" x2="236" y2="209" />
    <line x1="188" y1="155" x2="236" y2="203" />
    <line x1="194" y1="155" x2="236" y2="197" />
    <line x1="200" y1="155" x2="236" y2="191" />
    <line x1="206" y1="155" x2="236" y2="185" />
    <line x1="212" y1="155" x2="236" y2="179" />
    <line x1="218" y1="155" x2="236" y2="173" />
    <line x1="164" y1="161" x2="230" y2="227" />
    <line x1="164" y1="167" x2="224" y2="227" />
    <line x1="164" y1="173" x2="218" y2="227" />
    <line x1="164" y1="179" x2="212" y2="227" />
    <line x1="164" y1="185" x2="206" y2="227" />
    <line x1="164" y1="191" x2="200" y2="227" />
    <line x1="164" y1="197" x2="194" y2="227" />
    <line x1="164" y1="203" x2="188" y2="227" />
    <line x1="164" y1="209" x2="182" y2="227" />
    <line x1="164" y1="215" x2="176" y2="227" />
  </g>

  <!-- Center point -->
  <circle cx="200" cy="190" r="1"
    fill="#003DA5" opacity="0.3" />

  <!-- Faint construction crosshair -->
  <line x1="155" y1="190" x2="245" y2="190"
    stroke="#003DA5" stroke-width="0.3" opacity="0.12" />
  <line x1="200" y1="145" x2="200" y2="235"
    stroke="#003DA5" stroke-width="0.3" opacity="0.12" />

  <!-- Radius line -->
  <line x1="200" y1="190" x2="236" y2="190"
    stroke="#003DA5" stroke-width="0.5" opacity="0.3" />
  <circle cx="236" cy="190" r="1" fill="#003DA5" opacity="0.35" />

</svg>
