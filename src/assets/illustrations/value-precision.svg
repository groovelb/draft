<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">

  <!-- ============================================================
       CORE VALUE: PRECISION — 정밀함
       5mm 그리드 + 십자선 + 눈금
       Color: #003DA5 (Blueprint Blue), stroke only
       ============================================================ -->

  <defs>
    <clipPath id="precision-grid-clip">
      <circle cx="200" cy="200" r="120" />
    </clipPath>
  </defs>

  <!-- Grid field (clipped to circle) -->
  <g clip-path="url(#precision-grid-clip)" stroke="#003DA5" stroke-width="0.3" opacity="0.15">
    <!-- Horizontal lines -->
    <line x1="80" y1="100" x2="320" y2="100" />
    <line x1="80" y1="120" x2="320" y2="120" />
    <line x1="80" y1="140" x2="320" y2="140" />
    <line x1="80" y1="160" x2="320" y2="160" />
    <line x1="80" y1="180" x2="320" y2="180" />
    <line x1="80" y1="200" x2="320" y2="200" />
    <line x1="80" y1="220" x2="320" y2="220" />
    <line x1="80" y1="240" x2="320" y2="240" />
    <line x1="80" y1="260" x2="320" y2="260" />
    <line x1="80" y1="280" x2="320" y2="280" />
    <line x1="80" y1="300" x2="320" y2="300" />
    <!-- Vertical lines -->
    <line x1="100" y1="80" x2="100" y2="320" />
    <line x1="120" y1="80" x2="120" y2="320" />
    <line x1="140" y1="80" x2="140" y2="320" />
    <line x1="160" y1="80" x2="160" y2="320" />
    <line x1="180" y1="80" x2="180" y2="320" />
    <line x1="200" y1="80" x2="200" y2="320" />
    <line x1="220" y1="80" x2="220" y2="320" />
    <line x1="240" y1="80" x2="240" y2="320" />
    <line x1="260" y1="80" x2="260" y2="320" />
    <line x1="280" y1="80" x2="280" y2="320" />
    <line x1="300" y1="80" x2="300" y2="320" />
  </g>

  <!-- Outer circle -->
  <circle cx="200" cy="200" r="120"
    stroke="#003DA5" stroke-width="0.8" fill="none" opacity="0.3" />

  <!-- Crosshair (center) -->
  <g stroke="#003DA5" stroke-width="0.8" opacity="0.6">
    <!-- Horizontal -->
    <line x1="120" y1="200" x2="185" y2="200" />
    <line x1="215" y1="200" x2="280" y2="200" />
    <!-- Vertical -->
    <line x1="200" y1="120" x2="200" y2="185" />
    <line x1="200" y1="215" x2="200" y2="280" />
  </g>

  <!-- Center target -->
  <circle cx="200" cy="200" r="10"
    stroke="#003DA5" stroke-width="0.6" fill="none" opacity="0.5" />
  <circle cx="200" cy="200" r="2"
    fill="#003DA5" opacity="0.4" />

  <!-- Ruler ticks (top edge) -->
  <g stroke="#003DA5" stroke-width="0.4" opacity="0.35">
    <line x1="120" y1="80" x2="120" y2="90" />
    <line x1="140" y1="80" x2="140" y2="86" />
    <line x1="160" y1="80" x2="160" y2="90" />
    <line x1="180" y1="80" x2="180" y2="86" />
    <line x1="200" y1="80" x2="200" y2="93" />
    <line x1="220" y1="80" x2="220" y2="86" />
    <line x1="240" y1="80" x2="240" y2="90" />
    <line x1="260" y1="80" x2="260" y2="86" />
    <line x1="280" y1="80" x2="280" y2="90" />
  </g>
  <!-- Ruler line -->
  <line x1="110" y1="80" x2="290" y2="80"
    stroke="#003DA5" stroke-width="0.5" opacity="0.3" />

  <!-- 5mm label -->
  <text x="200" y="365"
    font-family="'VT323', monospace" font-size="7" fill="#003DA5"
    text-anchor="middle" opacity="0.5">
    5MM GRID
  </text>

</svg>
