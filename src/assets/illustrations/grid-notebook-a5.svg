<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">

  <!-- ============================================================
       GRID NOTEBOOK A5 — Blueprint Isometric Exploded View
       Color: #003DA5 (Blueprint Blue), stroke only
       Perspective: 30° true isometric
       ============================================================ -->

  <defs>
    <!-- Clip path for pages grid pattern -->
    <clipPath id="pages-clip">
      <polygon points="200,275 283,227 225,194 142,242" />
    </clipPath>
  </defs>

  <!-- ============================================================
       Layer 1: COVER (top)
       Front corner: (200, 155), W=100, D=70, H=5
       ============================================================ -->
  <g>
    <!-- Top face -->
    <polygon
      points="200,155 287,105 226,70 139,120"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.02)"
    />
    <!-- Right side face -->
    <polygon
      points="200,155 287,105 287,110 200,160"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.05)"
    />
    <!-- Left side face -->
    <polygon
      points="200,155 139,120 139,125 200,160"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.04)"
    />
  </g>

  <!-- ============================================================
       Layer 2: PAGES (middle)
       Front corner: (200, 275), W=96, D=67, H=16
       Slightly inset from cover
       ============================================================ -->
  <g>
    <!-- Top face -->
    <polygon
      points="200,275 283,227 225,194 142,242"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.02)"
    />

    <!-- 5mm Grid pattern on top face -->
    <g clip-path="url(#pages-clip)" stroke="#003DA5" stroke-width="0.4" opacity="0.35">
      <!-- Set A: lines parallel to width (spaced along depth) -->
      <line x1="188" y1="268" x2="271" y2="220" />
      <line x1="177" y1="262" x2="260" y2="214" />
      <line x1="165" y1="255" x2="248" y2="207" />
      <line x1="154" y1="249" x2="237" y2="201" />
      <!-- Set B: lines parallel to depth (spaced along width) -->
      <line x1="214" y1="267" x2="156" y2="234" />
      <line x1="228" y1="259" x2="170" y2="226" />
      <line x1="242" y1="251" x2="184" y2="218" />
      <line x1="255" y1="243" x2="197" y2="210" />
      <line x1="269" y1="235" x2="211" y2="202" />
    </g>

    <!-- Right side face -->
    <polygon
      points="200,275 283,227 283,243 200,291"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.05)"
    />
    <!-- Page edge lines (right face) -->
    <g stroke="#003DA5" stroke-width="0.3" opacity="0.3">
      <line x1="200" y1="278" x2="283" y2="230" />
      <line x1="200" y1="282" x2="283" y2="234" />
      <line x1="200" y1="285" x2="283" y2="237" />
      <line x1="200" y1="288" x2="283" y2="240" />
    </g>

    <!-- Left side face -->
    <polygon
      points="200,275 142,242 142,258 200,291"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.04)"
    />
    <!-- Page edge lines (left face) -->
    <g stroke="#003DA5" stroke-width="0.3" opacity="0.3">
      <line x1="200" y1="278" x2="142" y2="245" />
      <line x1="200" y1="282" x2="142" y2="249" />
      <line x1="200" y1="285" x2="142" y2="252" />
      <line x1="200" y1="288" x2="142" y2="255" />
    </g>
  </g>

  <!-- ============================================================
       Layer 3: BACK COVER (bottom)
       Front corner: (200, 395), W=100, D=70, H=5
       ============================================================ -->
  <g>
    <!-- Top face -->
    <polygon
      points="200,395 287,345 226,310 139,360"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.02)"
    />
    <!-- Right side face -->
    <polygon
      points="200,395 287,345 287,350 200,400"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.05)"
    />
    <!-- Left side face -->
    <polygon
      points="200,395 139,360 139,365 200,400"
      stroke="#003DA5" stroke-width="1"
      fill="rgba(0,61,165,0.04)"
    />
  </g>

  <!-- ============================================================
       Alignment guide lines (dashed, between layers)
       ============================================================ -->
  <g stroke="#003DA5" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.2">
    <!-- Front corner alignment -->
    <line x1="200" y1="165" x2="200" y2="270" />
    <line x1="200" y1="296" x2="200" y2="390" />
    <!-- Right corner alignment -->
    <line x1="287" y1="115" x2="283" y2="222" />
    <line x1="283" y1="248" x2="287" y2="340" />
  </g>

  <!-- ============================================================
       Annotations: Leader lines + Labels
       ============================================================ -->
  <g>
    <!-- COVER label -->
    <line x1="287" y1="107" x2="310" y2="107"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="287" cy="107" r="1.5" fill="#003DA5" />
    <text x="314" y="105"
      font-family="'VT323', monospace" font-size="7" fill="#003DA5">
      COVER
    </text>
    <text x="314" y="115"
      font-family="'VT323', monospace" font-size="6" fill="#003DA5" opacity="0.5">
      350GSM
    </text>

    <!-- PAGES label -->
    <line x1="283" y1="235" x2="310" y2="235"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="283" cy="235" r="1.5" fill="#003DA5" />
    <text x="314" y="233"
      font-family="'VT323', monospace" font-size="7" fill="#003DA5">
      192 PAGES
    </text>
    <text x="314" y="243"
      font-family="'VT323', monospace" font-size="6" fill="#003DA5" opacity="0.5">
      80GSM
    </text>

    <!-- BACK COVER label -->
    <line x1="287" y1="347" x2="310" y2="347"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="287" cy="347" r="1.5" fill="#003DA5" />
    <text x="314" y="350"
      font-family="'VT323', monospace" font-size="7" fill="#003DA5">
      BACK COVER
    </text>

    <!-- 5MM GRID label (left side) -->
    <line x1="165" y1="255" x2="108" y2="255"
      stroke="#003DA5" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="165" cy="255" r="1.5" fill="#003DA5" />
    <text x="60" y="258"
      font-family="'VT323', monospace" font-size="7" fill="#003DA5">
      5MM GRID
    </text>
  </g>

  <!-- ============================================================
       Dimension lines
       ============================================================ -->
  <g stroke="#003DA5" stroke-width="0.5" opacity="0.4">
    <!-- Width dimension (along right direction, below back cover) -->
    <!-- Start tick -->
    <line x1="196" y1="413" x2="204" y2="413" />
    <!-- End tick -->
    <line x1="283" y1="363" x2="291" y2="363" />
    <!-- Dimension line -->
    <line x1="200" y1="413" x2="287" y2="363" stroke-dasharray="2 2" />
  </g>
  <text x="235" y="398"
    font-family="'VT323', monospace" font-size="6" fill="#003DA5" opacity="0.5"
    transform="rotate(-30, 235, 398)">
    210MM
  </text>

  <g stroke="#003DA5" stroke-width="0.5" opacity="0.4">
    <!-- Depth dimension (along left direction, below back cover) -->
    <!-- Start tick -->
    <line x1="196" y1="413" x2="204" y2="413" />
    <!-- End tick -->
    <line x1="135" y1="378" x2="143" y2="378" />
    <!-- Dimension line -->
    <line x1="200" y1="413" x2="139" y2="378" stroke-dasharray="2 2" />
  </g>
  <text x="160" y="402"
    font-family="'VT323', monospace" font-size="6" fill="#003DA5" opacity="0.5"
    transform="rotate(30, 160, 402)">
    148MM
  </text>

  <!-- ============================================================
       Title
       ============================================================ -->
  <text x="200" y="470"
    font-family="'VT323', monospace" font-size="8" fill="#003DA5"
    text-anchor="middle" letter-spacing="0.1em">
    GRID NOTEBOOK A5
  </text>

</svg>
